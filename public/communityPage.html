<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeGeese</title>
    <link rel="stylesheet" href="css/com.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>
    <!-- Background Glow -->
    <div class="bg-glow glow1"></div>
    <div class="bg-glow glow2"></div>

    <!-- Header -->
    <header>
        <h1><span id="We">We</span>Geese</h1>
    </header>

    <main class="flock-layout">
        <!-- Left Column: Flock Workspace Details -->
        <section class="flock-panel main-panel">
            <div class="panel-pill-header">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>flock_name</h2>
            </div>

            <div class="panel-content-area">
                <!-- Feed / Metrics / Challenges go here -->
                <p class="placeholder-text">Welcome to your coding flock dashboard. Keep consistent and stay in
                    formation!</p>
            </div>
        </section>

        <!-- Right Column: Controls and Status -->
        <div class="flock-sidebar">
            <!-- Admin Controls Card -->
            <section class="flock-panel admin-panel">
                <div class="panel-pill-header">
                    <i class="fa-solid fa-sliders"></i>
                    <h2>ADMIN CONTROLs</h2>
                </div>

                <div class="panel-content-area">
                    <!-- Admin button triggers go here -->
                </div>
            </section>

            <!-- Ranks Card -->
            <section class="flock-panel ranks-panel">
                <div class="panel-pill-header">
                    <i class="fa-solid fa-trophy"></i>
                    <h2>ranks</h2>
                </div>

                <div class="panel-content-area">
                    <!-- Leaderboard layout goes here -->
                </div>
            </section>
        </div>
    </main>
</body>

</html>
