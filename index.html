<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WeGeese — Flock Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { background: #0A0E14; margin: 0; padding: 0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useMemo } = React;

/* ---------------------------------------------------------------------
   WeGeese — gamified accountability dashboard for flocks of coders
   Signature motif: the V-formation chevron. It marks the wordmark, the
   flock code, and leads every member row — filled for the flock leader,
   outlined for the rest — echoing geese flying in formation.
--------------------------------------------------------------------- */

const initialMembers = [
  { id: 1, name: "Aarav Krishnan", skillRackId: "SR-2201", solved: 10, isLeader: true },
  { id: 2, name: "Priya Natarajan", skillRackId: "SR-2214", solved: 9 },
  { id: 3, name: "Dev Raghunathan", skillRackId: "SR-2233", solved: 7 },
  { id: 4, name: "Sneha Balamurali", skillRackId: "SR-2247", solved: 5 },
  { id: 5, name: "Karthik Iyer", skillRackId: "SR-2259", solved: 3 },
  { id: 6, name: "Meera Vasanth", skillRackId: "SR-2260", solved: 1 },
];

/* ---------------- inline icon set (no external icon package needed) ---------------- */

function Icon({ children, size = 16, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      {children}
    </svg>
  );
}
const CopyIcon = (p) => <Icon {...p}><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></Icon>;
const LogOutIcon = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></Icon>;
const TargetIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;
const TrophyIcon = (p) => <Icon {...p}><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M17 5h3a2 2 0 0 1-2 4h-1"/><path d="M7 5H4a2 2 0 0 0 2 4h1"/></Icon>;
const LockIcon = (p) => <Icon {...p}><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></Icon>;
const PartyIcon = (p) => <Icon {...p}><path d="M5.8 11.3L2 22l10.7-3.8"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="M22 2l-1 5 1 5-5 1-5-1-1-5 1-5 5 1z" opacity="0"/><path d="M11.8 2.7l1.4 1.4-1.4 1.4 1.4 1.4-1.4 1.4"/><path d="M17.8 6.7l1.4 1.4-1.4 1.4 1.4 1.4-1.4 1.4"/></Icon>;
const ChevronRightIcon = (p) => <Icon {...p}><path d="M9 18l6-6-6-6"/></Icon>;
const CheckIcon = (p) => <Icon {...p}><path d="M20 6L9 17l-5-5"/></Icon>;
const UsersIcon = (p) => <Icon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
const SparklesIcon = (p) => <Icon {...p}><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/><path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8L19 15z"/></Icon>;

function Chevron({ filled = false, size = 18, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" className={className} fill="none">
      <path d="M4 6L12 14L20 6" stroke={filled ? "#0A0E14" : "currentColor"} strokeWidth="3"
        strokeLinecap="round" strokeLinejoin="round" fill={filled ? "currentColor" : "none"} />
    </svg>
  );
}

function Logo({ size = 28 }) {
  return (
    <div className="flex items-center gap-2.5">
      <div className="relative" style={{ width: size, height: size }}>
        <svg viewBox="0 0 40 40" className="w-full h-full">
          <path d="M4 30L20 8L36 30" stroke="#22D3EE" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          <path d="M11 30L20 17L29 30" stroke="#34D399" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" fill="none" opacity="0.65" />
        </svg>
      </div>
      <span className="text-xl font-semibold tracking-tight text-slate-100" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>
        WeGeese
      </span>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [name, setName] = useState("");
  const [skillRackId, setSkillRackId] = useState("");
  const canSubmit = name.trim().length > 0 && skillRackId.trim().length > 0;

  return (
    <div className="min-h-screen w-full flex items-center justify-center px-4 relative overflow-hidden" style={{ background: "#0A0E14" }}>
      <div className="absolute inset-0 opacity-[0.07] pointer-events-none select-none">
        {[0, 1, 2, 3, 4].map((i) => (
          <svg key={i} viewBox="0 0 400 200" className="absolute"
            style={{ top: `${10 + i * 18}%`, left: i % 2 === 0 ? "-5%" : "55%", width: "50%" }}>
            <path d="M0 180L200 20L400 180" stroke="#22D3EE" strokeWidth="2" fill="none" />
          </svg>
        ))}
      </div>

      <div className="w-full max-w-md relative z-10">
        <div className="flex flex-col items-center mb-8">
          <Logo size={40} />
          <p className="mt-4 text-center text-sm leading-relaxed text-slate-400 max-w-sm" style={{ fontFamily: "'Inter', sans-serif" }}>
            Geese fly in a <span className="text-cyan-400 font-medium">V-formation</span> to cut wind resistance
            and travel further together. WeGeese does the same for your coding practice — join a flock, solve
            problems in sync, and unlock rewards as a team.
          </p>
        </div>

        <div className="rounded-2xl p-8 border shadow-2xl" style={{
          background: "#131922", borderColor: "#1F2937",
          boxShadow: "0 0 0 1px rgba(34,211,238,0.05), 0 20px 60px rgba(0,0,0,0.5)",
        }}>
          <h2 className="text-lg font-semibold text-slate-100 mb-1" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>
            Join the flock
          </h2>
          <p className="text-sm text-slate-500 mb-6" style={{ fontFamily: "'Inter', sans-serif" }}>
            Enter your details to take your place in formation.
          </p>

          <div className="space-y-4">
            <div>
              <label className="block text-xs font-medium text-slate-400 mb-1.5 tracking-wide uppercase" style={{ fontFamily: "'Inter', sans-serif" }}>
                Name
              </label>
              <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Aarav Krishnan"
                className="w-full px-4 py-2.5 rounded-lg bg-slate-900/60 border border-slate-700 text-slate-100 placeholder-slate-600 outline-none transition-all duration-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20"
                style={{ fontFamily: "'Inter', sans-serif" }} />
            </div>
            <div>
              <label className="block text-xs font-medium text-slate-400 mb-1.5 tracking-wide uppercase" style={{ fontFamily: "'Inter', sans-serif" }}>
                SkillRack ID
              </label>
              <input type="text" value={skillRackId} onChange={(e) => setSkillRackId(e.target.value)} placeholder="SR-2201"
                className="w-full px-4 py-2.5 rounded-lg bg-slate-900/60 border border-slate-700 text-slate-100 placeholder-slate-600 outline-none transition-all duration-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20"
                style={{ fontFamily: "'JetBrains Mono', monospace" }} />
            </div>

            <button disabled={!canSubmit}
              onClick={() => canSubmit && onLogin({ name: name.trim(), skillRackId: skillRackId.trim() })}
              className={`w-full mt-2 py-2.5 rounded-lg font-medium text-sm transition-all duration-200 flex items-center justify-center gap-2 ${
                canSubmit ? "bg-cyan-500 text-slate-950 hover:bg-cyan-400 active:scale-[0.98] shadow-lg shadow-cyan-500/20"
                           : "bg-slate-800 text-slate-600 cursor-not-allowed"
              }`} style={{ fontFamily: "'Inter', sans-serif" }}>
              Enter the formation
              <ChevronRightIcon size={16} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Header({ user, onLogout }) {
  const initials = user.name.split(" ").map((p) => p[0]).join("").slice(0, 2).toUpperCase();
  return (
    <header className="sticky top-0 z-20 border-b backdrop-blur-md" style={{ background: "rgba(10,14,20,0.85)", borderColor: "#1F2937" }}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3.5 flex items-center justify-between">
        <Logo />
        <div className="flex items-center gap-3">
          <div className="hidden sm:flex flex-col items-end leading-tight">
            <span className="text-sm font-medium text-slate-200" style={{ fontFamily: "'Inter', sans-serif" }}>{user.name}</span>
            <span className="text-xs text-slate-500" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{user.skillRackId}</span>
          </div>
          <div className="w-9 h-9 rounded-full flex items-center justify-center text-xs font-semibold border" style={{
            background: "linear-gradient(135deg, rgba(34,211,238,0.15), rgba(52,211,153,0.15))",
            borderColor: "#22D3EE44", color: "#22D3EE", fontFamily: "'Space Grotesk', sans-serif",
          }}>{initials}</div>
          <button onClick={onLogout}
            className="p-2 rounded-lg border border-slate-800 text-slate-400 hover:text-red-400 hover:border-red-500/30 hover:bg-red-500/5 transition-all duration-200"
            title="Log out">
            <LogOutIcon size={16} />
          </button>
        </div>
      </div>
    </header>
  );
}

function FlockCodeCard() {
  const [copied, setCopied] = useState(false);
  const code = "GEESE-889X";
  const handleCopy = () => { setCopied(true); setTimeout(() => setCopied(false), 1800); };

  return (
    <div className="rounded-xl p-5 border" style={{ background: "#131922", borderColor: "#1F2937" }}>
      <div className="flex items-center gap-2 mb-3">
        <UsersIcon size={15} className="text-cyan-400" />
        <h3 className="text-xs font-semibold tracking-wide uppercase text-slate-400" style={{ fontFamily: "'Inter', sans-serif" }}>
          Flock code
        </h3>
      </div>

      <div className="flex items-center justify-between rounded-lg px-4 py-3 mb-3 border" style={{ background: "#0A0E14", borderColor: "#1F2937" }}>
        <span className="text-lg font-semibold tracking-wider text-cyan-400" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{code}</span>
        <div className="flex gap-1">
          <Chevron size={14} className="text-slate-600" />
          <Chevron size={14} className="text-slate-700" />
        </div>
      </div>

      <button onClick={handleCopy}
        className={`w-full py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-2 transition-all duration-200 ${
          copied ? "bg-emerald-500/15 text-emerald-400 border border-emerald-500/30"
                 : "bg-slate-800/60 text-slate-300 border border-slate-700 hover:bg-slate-800 hover:border-slate-600"
        }`} style={{ fontFamily: "'Inter', sans-serif" }}>
        {copied ? (<><CheckIcon size={14} /> Link copied</>) : (<><CopyIcon size={14} /> Copy invite link</>)}
      </button>
    </div>
  );
}

function LeaderSettingsCard({ target, setTarget, reward, setReward }) {
  const [draftTarget, setDraftTarget] = useState(target);
  const [draftReward, setDraftReward] = useState(reward);
  const [justUpdated, setJustUpdated] = useState(false);

  const handleUpdate = () => {
    setTarget(Math.max(1, Number(draftTarget) || 10));
    setReward(draftReward.trim() || reward);
    setJustUpdated(true);
    setTimeout(() => setJustUpdated(false), 1800);
  };

  return (
    <div className="rounded-xl p-5 border relative overflow-hidden" style={{
      background: "linear-gradient(160deg, #1A1508 0%, #131922 55%)", borderColor: "rgba(251,191,36,0.25)",
    }}>
      <div className="absolute -top-8 -right-8 w-28 h-28 rounded-full pointer-events-none"
        style={{ background: "radial-gradient(circle, rgba(251,191,36,0.15), transparent 70%)" }} />
      <div className="flex items-center gap-2 mb-4 relative">
        <SparklesIcon size={15} className="text-amber-400" />
        <h3 className="text-xs font-semibold tracking-wide uppercase text-amber-400" style={{ fontFamily: "'Inter', sans-serif" }}>
          Leader settings
        </h3>
      </div>

      <div className="space-y-3.5 relative">
        <div>
          <label className="block text-xs text-slate-400 mb-1.5" style={{ fontFamily: "'Inter', sans-serif" }}>
            Target problems per member
          </label>
          <input type="number" min={1} value={draftTarget} onChange={(e) => setDraftTarget(e.target.value)}
            className="w-full px-3 py-2 rounded-lg bg-slate-900/60 border border-slate-700 text-slate-100 outline-none transition-all duration-200 focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 text-sm"
            style={{ fontFamily: "'JetBrains Mono', monospace" }} />
        </div>
        <div>
          <label className="block text-xs text-slate-400 mb-1.5" style={{ fontFamily: "'Inter', sans-serif" }}>
            Flock reward / landing goal
          </label>
          <input type="text" value={draftReward} onChange={(e) => setDraftReward(e.target.value)} placeholder="Weekend Cricket Match"
            className="w-full px-3 py-2 rounded-lg bg-slate-900/60 border border-slate-700 text-slate-100 placeholder-slate-600 outline-none transition-all duration-200 focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 text-sm"
            style={{ fontFamily: "'Inter', sans-serif" }} />
        </div>

        <button onClick={handleUpdate}
          className={`w-full py-2 rounded-lg text-sm font-medium transition-all duration-200 flex items-center justify-center gap-2 ${
            justUpdated ? "bg-emerald-500/15 text-emerald-400 border border-emerald-500/30"
                        : "bg-amber-500 text-slate-950 hover:bg-amber-400 active:scale-[0.98] shadow-lg shadow-amber-500/20"
          }`} style={{ fontFamily: "'Inter', sans-serif" }}>
          {justUpdated ? (<><CheckIcon size={14} /> Target updated</>) : "Update target"}
        </button>
      </div>
    </div>
  );
}

function RewardStatusBar({ target, reward, unlocked, avgProgress }) {
  return (
    <div className="rounded-2xl p-6 sm:p-7 border relative overflow-hidden transition-all duration-500" style={{
      background: unlocked ? "linear-gradient(135deg, rgba(52,211,153,0.12), #131922 60%)" : "linear-gradient(135deg, rgba(34,211,238,0.08), #131922 60%)",
      borderColor: unlocked ? "rgba(52,211,153,0.35)" : "rgba(34,211,238,0.2)",
      boxShadow: unlocked ? "0 0 40px rgba(52,211,153,0.12)" : "0 0 40px rgba(34,211,238,0.06)",
    }}>
      <div className="absolute inset-0 opacity-[0.06] pointer-events-none">
        <svg viewBox="0 0 400 120" className="w-full h-full">
          <path d="M0 100L200 10L400 100" stroke={unlocked ? "#34D399" : "#22D3EE"} strokeWidth="3" fill="none" />
        </svg>
      </div>

      <div className="relative flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <div className="flex items-center gap-2 mb-2">
            <TargetIcon size={16} className={unlocked ? "text-emerald-400" : "text-cyan-400"} />
            <span className="text-xs font-semibold tracking-wide uppercase" style={{ color: unlocked ? "#34D399" : "#22D3EE", fontFamily: "'Inter', sans-serif" }}>
              Flock goal
            </span>
          </div>
          <h2 className="text-xl sm:text-2xl font-semibold text-slate-100 mb-1" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>
            Target: {target} Problems <span className="text-slate-500 mx-1">→</span> Reward: {reward}
          </h2>
          <p className="text-sm text-slate-400" style={{ fontFamily: "'Inter', sans-serif" }}>
            Flock average: {avgProgress}% toward formation goal
          </p>
        </div>

        <div className={`flex items-center gap-2 px-4 py-2.5 rounded-xl border font-semibold text-sm shrink-0 transition-all duration-500 ${
          unlocked ? "bg-emerald-500/15 border-emerald-500/40 text-emerald-300" : "bg-slate-800/60 border-slate-700 text-slate-300"
        }`} style={{ fontFamily: "'Inter', sans-serif" }}>
          {unlocked ? (<><PartyIcon size={18} className="animate-pulse" /> GOAL UNLOCKED!</>) : (<><LockIcon size={16} /> Flock Goal Locked</>)}
        </div>
      </div>
    </div>
  );
}

function MemberRow({ member, target }) {
  const pct = Math.min(100, Math.round((member.solved / target) * 100));
  const achieved = member.solved >= target;
  const initials = member.name.split(" ").map((p) => p[0]).join("").slice(0, 2).toUpperCase();

  return (
    <div className={`rounded-xl p-4 sm:p-5 border transition-all duration-300 ${achieved ? "bg-emerald-500/[0.06]" : ""}`} style={{
      borderColor: achieved ? "rgba(52,211,153,0.4)" : "#1F2937",
      background: achieved ? undefined : "#131922",
      boxShadow: achieved ? "0 0 24px rgba(52,211,153,0.1)" : "none",
    }}>
      <div className="flex items-center gap-3 sm:gap-4">
        <Chevron filled={member.isLeader} size={16} className={member.isLeader ? "text-amber-400 shrink-0" : "text-slate-600 shrink-0"} />

        <div className="w-10 h-10 rounded-full flex items-center justify-center text-xs font-semibold border shrink-0" style={{
          background: achieved ? "rgba(52,211,153,0.12)" : "rgba(148,163,184,0.08)",
          borderColor: achieved ? "rgba(52,211,153,0.4)" : "#1F2937",
          color: achieved ? "#34D399" : "#94A3B8", fontFamily: "'Space Grotesk', sans-serif",
        }}>{initials}</div>

        <div className="flex-1 min-w-0">
          <div className="flex items-center justify-between gap-2 mb-1.5 flex-wrap">
            <div className="flex items-center gap-2 min-w-0">
              <span className="text-sm font-medium text-slate-100 truncate" style={{ fontFamily: "'Inter', sans-serif" }}>{member.name}</span>
              {member.isLeader && (
                <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded uppercase tracking-wide shrink-0" style={{
                  background: "rgba(251,191,36,0.15)", color: "#FBBF24", fontFamily: "'Inter', sans-serif",
                }}>Leader</span>
              )}
              <span className="text-xs text-slate-500 shrink-0" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{member.skillRackId}</span>
            </div>
            {achieved && <TrophyIcon size={14} className="text-emerald-400 shrink-0" />}
          </div>

          <div className="w-full h-2 rounded-full overflow-hidden mb-1.5" style={{ background: "#0A0E14" }}>
            <div className="h-full rounded-full transition-all duration-700 ease-out" style={{
              width: `${pct}%`,
              background: achieved ? "linear-gradient(90deg, #10B981, #34D399)" : "linear-gradient(90deg, #0891B2, #22D3EE)",
              boxShadow: achieved ? "0 0 8px rgba(52,211,153,0.5)" : "0 0 6px rgba(34,211,238,0.35)",
            }} />
          </div>

          <div className="flex items-center justify-between">
            <span className="text-xs text-slate-400" style={{ fontFamily: "'Inter', sans-serif" }}>
              {member.solved} / {target} Problems Solved
            </span>
            <span className={`text-xs font-semibold ${achieved ? "text-emerald-400" : "text-slate-500"}`} style={{ fontFamily: "'JetBrains Mono', monospace" }}>
              {pct}%
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

function WeGeeseDashboard() {
  const [user, setUser] = useState(null);
  const [target, setTarget] = useState(10);
  const [reward, setReward] = useState("Weekend Cricket Match & Pizza");
  const [members] = useState(initialMembers);

  const allAchieved = useMemo(() => members.every((m) => m.solved >= target), [members, target]);
  const avgProgress = useMemo(() => {
    const avg = members.reduce((acc, m) => acc + Math.min(100, (m.solved / target) * 100), 0) / members.length;
    return Math.round(avg);
  }, [members, target]);

  if (!user) return <LoginScreen onLogin={setUser} />;

  return (
    <div className="min-h-screen w-full" style={{ background: "#0A0E14" }}>
      <Header user={user} onLogout={() => setUser(null)} />
      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <div className="grid grid-cols-1 lg:grid-cols-[300px_1fr] gap-6">
          <aside className="space-y-5 order-2 lg:order-1">
            <FlockCodeCard />
            <LeaderSettingsCard target={target} setTarget={setTarget} reward={reward} setReward={setReward} />
          </aside>

          <section className="space-y-6 order-1 lg:order-2">
            <RewardStatusBar target={target} reward={reward} unlocked={allAchieved} avgProgress={avgProgress} />

            <div>
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-sm font-semibold text-slate-300 tracking-wide uppercase" style={{ fontFamily: "'Inter', sans-serif" }}>
                  Live progress trackers
                </h3>
                <span className="text-xs text-slate-500" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                  {members.filter((m) => m.solved >= target).length} / {members.length} landed
                </span>
              </div>

              <div className="space-y-3">
                {members.map((member) => (
                  <MemberRow key={member.id} member={member} target={target} />
                ))}
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<WeGeeseDashboard />);
</script>
</body>
</html>
